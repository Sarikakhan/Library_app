<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Library Manager | Sarika Khan</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet">
    <style>
        :root { --primary: #05A0E1; --dark: #0f172a; --bg: #f8fafc; --shadow: 0 10px 30px rgba(0,0,0,0.08); }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Poppins', sans-serif; background: var(--bg); color: var(--dark); padding: 30px; }
        .container { max-width: 1100px; margin: auto; }
        .glass-nav { background: rgba(255,255,255,0.8); backdrop-filter: blur(10px); padding: 20px 40px; border-radius: 20px; display: flex; justify-content: space-between; align-items: center; box-shadow: var(--shadow); margin-bottom: 40px; border: 1px solid rgba(255,255,255,0.3); }
        .nav-links a { text-decoration: none; color: var(--dark); font-weight: 600; margin-left: 25px; font-size: 14px; transition: 0.3s; }
        .nav-links a:hover { color: var(--primary); }
        h1 { font-size: 32px; font-weight: 700; margin-bottom: 25px; color: var(--dark); }
        .accent-line { width: 50px; height: 4px; background: var(--primary); border-radius: 2px; margin-bottom: 20px; }
        .btn-modern { background: var(--primary); color: white; padding: 12px 25px; border-radius: 12px; text-decoration: none; font-weight: 600; border: none; cursor: pointer; transition: 0.4s; display: inline-flex; align-items: center; gap: 10px; box-shadow: 0 4px 15px rgba(5, 160, 225, 0.3); }
        .btn-modern:hover { transform: translateY(-3px); box-shadow: 0 8px 25px rgba(5, 160, 225, 0.4); }
        .card { background: white; padding: 25px; border-radius: 20px; box-shadow: var(--shadow); border: 1px solid #f1f5f9; transition: 0.4s; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 25px; }
        .form-input { padding: 15px; border-radius: 12px; border: 1px solid #e2e8f0; width: 100%; outline: none; margin-bottom: 15px; }
    </style>
</head>
<body>
    <div class="container">
        <nav class="glass-nav" data-aos="fade-down">
            <div style="font-weight: 700; font-size: 20px;">📚 <span style="color: var(--primary);">Library</span>Hub</div>
            <div class="nav-links">
                <a href="{% url 'home' %}">Catalog</a>
                <a href="{% url 'issued_books' %}">Issued</a>
                <a href="{% url 'issue_book' %}" class="btn-modern">Issue Book</a>
            </div>
        </nav>
        {% block content %}{% endblock %}
    </div>
    <script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
    <script> AOS.init({ duration: 800, once: true }); </script>
</body>
</html>
